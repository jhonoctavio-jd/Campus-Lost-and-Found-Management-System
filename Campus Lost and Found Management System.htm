<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">


  <title> PHINMA COC Campus Lost and Found Management System</title>

  <style>
    

    body{

      font-family: Arial, sans-serif;

      margin:0;

      background:#f5f5f5;

    }

    /*HEADER*/

    header{
    

      background:#1b5e20; /*Green*/

      color:white;

      text-align:center;

      padding:20px;

    }

    /*NAVIGATION*/

    nav{

      background:#2e7d32; 

      padding:10px;

      text-align:center;

    }

    nav a{

      color:black;

      text-decoration:none;

      margin:0 15px;

      font-weight:bold;

    }

    nav a:hover{

      color:#ffd700; /*Gold*/

    }

    /*MAIN CONTAINER*/

    .container{

      width:80%;

      margin:auto;

      margin-top:30px;

    }

    /*CARDS*/

    .card{

      background:white;

      padding:20px;

      margin-bottom:20px;

      border-radius:10px;

      box-shadow:0 3px 8px rgba(0,0,0,0.1);

      border-left:6px solid #ffd700; /*Gold Accent*/

    }

    .card h2{

      color:black;

    }

    /*INPUT*/

    input{

      width:100%;

      padding:10px;

      margin-top:10px;

      margin-bottom:15px;

      border-radius:5px;

      border:1px solid #ccc;

    }

    /*BUTTON*/

    button{

      background:#1b5e20; /*Green*/

      color:white;

      border:none;

      padding:10px 20px;

      border-radius:5px;

      cursor:pointer;

    }

    button:hover{

      background:#ffd700; /*Gold*/

      color:black;

    }

    /*FOOTER*/

    footer{

      background:#1b5e20;

      color:black;

      text-align:center;

      padding:10px;

      margin-top:40px;

    }

  </style>

</head>

<body>
<center>

  <header>

    <h1>Campus Lost and Found Management System</h1>

    <p>Helping students recover lost items easily</p>

  </header>

  <nav>

    <a href="           

    <a href="#">Report Lost</a>

    <a href="                   

    <a href="#">Search Item</a>

    <a href="                 

    <a href="#">Found Items</a>

  </nav>

  <div class="container">

    <div class="card">

      <h2>Report Lost Item</h2>

      <label>Item Name</label>

      <input type="text" placeholder="Enter item name">

      <label>Description</label>

      <input type="text" placeholder="Describe the item">

      <label>Location Lost</label>

      <input type="text" placeholder="Where did you lose it?">

      <button>Submit Lost Report</button>

    </div>

    <div class="card">

      <h2>Report Found Item</h2>

      <label>Item Name</label>

      <input type="text" placeholder="Enter item name">

      <label>Description</label>

      <input type="text" placeholder="Describe the item">

      <label>Location Found</label>

      <input type="text" placeholder="Where was it found?">

      <button>Submit Found Report</button>

    </div>

    <div class="card">

      <h2>Search Lost Item</h2>

      <input type="text" placeholder="Search item name...">

      <button>Search</button>

    </div>

  </div>

  <footer>

    <center><p>&copy; 2026 PHINMA COC Campus Lost and Found System</p></center>

  </footer>

</body>

</html>
